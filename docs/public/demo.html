<!DOCTYPE html>
<!--
  Heddle live editor demo — a self-contained static page served by GitHub Pages at
  /Heddle/demo.html. It loads the custom Ace bundle (built from src/Heddle.Language by
  the docs workflow into ./ace/) and enables the Heddle mode, which provides syntax
  highlighting and live parse-error reporting via the ANTLR-generated JS parser running
  in a Web Worker. It does NOT render templates — the Heddle engine is .NET.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heddle — Live Editor Demo</title>
  <meta name="description" content="Try the Heddle template language in your browser: live syntax highlighting and parse-error checking." />
  <style>
    :root {
      --bg: #ffffff; --fg: #1c1e21; --muted: #6a737d; --border: #e2e2e3;
      --accent: #3451b2; --banner: #f6f6f7;
    }
    html.dark {
      --bg: #1b1b1f; --fg: #dfdfd6; --muted: #98989f; --border: #2e2e32;
      --accent: #a8b1ff; --banner: #202127;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; background: var(--bg); color: var(--fg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--banner);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .note { color: var(--muted); font-size: 12.5px; flex: 1 1 320px; min-width: 0; }
    header a { color: var(--accent); text-decoration: none; }
    header a:hover { text-decoration: underline; }
    header .links { display: flex; gap: 14px; align-items: center; }
    button {
      font: inherit; cursor: pointer; color: var(--fg); background: transparent;
      border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
    }
    button:hover { border-color: var(--accent); }
    #editor { flex: 1 1 auto; width: 100%; font-size: 14px; }
    noscript { padding: 16px; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Heddle&nbsp;— Live Editor</h1>
    <span class="note">
      Live syntax highlighting &amp; parse-error checking. This demo checks syntax only —
      it does <strong>not</strong> render output (the engine is .NET).
    </span>
    <span class="links">
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌓 Theme</button>
      <a href="./">Docs</a>
      <a href="https://github.com/multiarc/Heddle" target="_blank" rel="noreferrer">GitHub</a>
    </span>
  </header>

  <noscript>This interactive demo requires JavaScript.</noscript>
  <div id="editor"></div>

  <script src="ace/ace.js"></script>
  <script>
    (function () {
      // A small, intentionally clean template. Edit it — try deleting a `)` or a `}`
      // to watch the live parse-error squiggles appear.
      var SAMPLE = [
        "@* Welcome to the Heddle live editor.",
        "   Syntax highlighting and error checking update as you type.",
        "   This demo checks syntax only and does not render output. *@",
        "",
        "@model(){{dynamic}}",
        "",
        "<p>Hi @(Name) — you have @int(Count) new",
        "   @if(Count){{comments}}@ifnot(Count){{messages}}.</p>",
        "",
        "@* Tip: break the markup above to see live error reporting. *@"
      ].join("\n");

      ace.config.set("basePath", "ace");

      var editor = ace.edit("editor");
      editor.session.setMode("ace/mode/heddle");
      editor.setOptions({
        fontSize: "14px",
        showPrintMargin: false,
        useWorker: true,
        wrap: true,
        tabSize: 2,
        useSoftTabs: true
      });
      editor.setValue(SAMPLE, -1);
      editor.focus();

      // Light/dark theme toggle (Ace theme + page chrome), persisted.
      var THEMES = { light: "ace/theme/textmate", dark: "ace/theme/tomorrow_night" };
      function apply(mode) {
        document.documentElement.classList.toggle("dark", mode === "dark");
        editor.setTheme(THEMES[mode]);
        try { localStorage.setItem("heddle-demo-theme", mode); } catch (e) {}
      }
      var saved = null;
      try { saved = localStorage.getItem("heddle-demo-theme"); } catch (e) {}
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      apply(saved || (prefersDark ? "dark" : "light"));

      document.getElementById("theme-toggle").addEventListener("click", function () {
        apply(document.documentElement.classList.contains("dark") ? "light" : "dark");
      });
    })();
  </script>
</body>
</html>
