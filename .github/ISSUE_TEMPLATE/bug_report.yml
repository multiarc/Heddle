name: Bug report
description: Report a problem with Heddle
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please **do not report security
        vulnerabilities here** — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the actual vs. expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, ideally with a small template and the C# call that renders it.
      placeholder: |
        1. Template: ...
        2. Render with: ...
        3. Observed output / error: ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Heddle version
      placeholder: e.g. 4.0.2
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Target framework / OS
      placeholder: e.g. net8.0 on Windows 11
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Stack traces, logs, or anything else that helps.
    validations:
      required: false
