# Builds the VitePress documentation site from docs/*.md and deploys it to GitHub
# Pages. One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".

name: Heddle Docs

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/**'
      - 'syntaxes/heddle.tmLanguage.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        # Full history so VitePress lastUpdated works and the grammar under
        # ../syntaxes is present for the build.
        fetch-depth: 0
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: docs/package-lock.json
    - name: Install dependencies
      working-directory: docs
      run: npm ci
    - name: Build site
      working-directory: docs
      run: npm run docs:build
    - name: Configure Pages
      uses: actions/configure-pages@v5
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
