# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Templater

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET 3.1.x
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 3.1.x
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Test
      run: dotnet test -c Debug --no-restore --verbosity normal
    - name: Authenticate Github Packages
      if: ${{ matrix.os == 'windows-latest' }}
      run: dotnet nuget add source --username multiarc --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/multiarc/index.json"
    - name: Upload Beta Packages
      if: ${{ github.ref != 'refs/heads/main' && matrix.os == 'windows-latest' }}
      run: | 
        dotnet pack -c Release --no-build --no-restore --include-source --include-symbols -o ${{runner.temp}}\results\packages\beta --version-suffix -beta${{github.run_number}}
        dotnet nuget push "${{runner.temp}}\results\packages\beta\*.symbols.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"
    - name: Upload Release Packages
      if: ${{ github.ref == 'refs/heads/main' && matrix.os == 'windows-latest' }}
      run: |
        dotnet pack -c Release --no-build --no-restore --include-source --include-symbols -o ${{runner.temp}}\results\packages\release --version-suffix .${{github.run_number}}
        dotnet nuget push "${{runner.temp}}\results\packages\release\*.symbols.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"