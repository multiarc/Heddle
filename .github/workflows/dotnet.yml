# Build/test on every push and PR. Internal PRs publish beta prereleases to nuget.org.
# Production releases are TAG-DRIVEN: push a `vX.Y.Z` tag and CI publishes that exact
# version to nuget.org (as latest) and creates a GitHub Release. Merging to main does NOT
# publish — it only builds/tests.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Heddle

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

# Default token is read-only. Fork PRs only ever get this; publish jobs grant
# themselves the extra scope they need.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          6.0.x
          8.0.x
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Test
      run: dotnet test -c Debug --no-restore

  # Internal (non-fork) pull requests publish a beta prerelease to nuget.org.
  prerelease:
    needs: build
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC token for nuget.org Trusted Publishing
    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          6.0.x
          8.0.x
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    # No `dotnet build --no-build` split here: Heddle.Tool / Heddle.LanguageServer are RID-specific
    # .NET tools (PackAsTool + multiple RuntimeIdentifiers), so `dotnet pack` must publish each RID.
    # A RID-less `dotnet build` never produces those per-RID outputs, so `--no-build` fails with
    # MSB3030 (missing per-RID assemblies) / NETSDK1085. Let pack build+publish, like the release job.
    - name: Pack beta packages
      run: dotnet pack -c Release -o ${{ runner.temp }}/pkg --version-suffix "-beta.${{ github.run_number }}"
    - name: NuGet login (OIDC -> short-lived API key)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Push beta to nuget.org
      run: dotnet nuget push "${{ runner.temp }}/pkg/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  # Production release: triggered by pushing a `vX.Y.Z` tag. Publishes that exact version
  # (becomes "latest" on nuget.org automatically) and creates a GitHub Release.
  release:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # OIDC token for nuget.org Trusted Publishing
    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          6.0.x
          8.0.x
        global-json-file: global.json
    - name: Resolve version from tag
      id: ver
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
    - name: Restore dependencies
      run: dotnet restore
    - name: Pack release packages
      run: dotnet pack -c Release -p:Version=${{ steps.ver.outputs.version }} -o ${{ runner.temp }}/pkg
    - name: NuGet login (OIDC -> short-lived API key)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Push release to nuget.org
      # No --skip-duplicate: a release of an already-published version must fail loudly.
      run: dotnet nuget push "${{ runner.temp }}/pkg/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
          || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
