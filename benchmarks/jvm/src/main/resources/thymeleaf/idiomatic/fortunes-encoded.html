<!--/*
  Idiomatic Thymeleaf authoring (Q1.7/D7) — official doc citations:
  https://www.thymeleaf.org/doc/tutorials/3.1/usingthymeleaf.html
    §3 (natural templating, xmlns:th on the root element),
    §6 (iteration: th:each), §12 (escaped text: th:text)
*/-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Fortunes</title>
</head>
<body>
<table>
    <tr>
        <th>id</th>
        <th>message</th>
    </tr>
    <tr th:each="r : ${rows}">
        <td th:text="${r.id}">1</td>
        <td th:text="${r.message}">fortune message</td>
    </tr>
</table>
</body>
</html>
