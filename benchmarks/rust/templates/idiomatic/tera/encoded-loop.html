{# Idiomatic Tera template (WI5, README D8/Q1.7). Patterns follow the Tera docs
   (keats.github.io/tera): "Auto-escaping" (default escaping covers text and
   attribute-value positions) and "Control structures - For loops". #}
<table>
  {% for item in items %}
    <tr>
      <td data-tag="{{ item.tag }}">{{ item.name }}</td>
      <td>{{ item.comment }}</td>
    </tr>
  {% endfor %}
</table>
