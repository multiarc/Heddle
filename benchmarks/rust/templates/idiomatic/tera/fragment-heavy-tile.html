{# Idiomatic Tera tile partial (WI5, README D8/Q1.7). Patterns follow the Tera docs
   (keats.github.io/tera): "Include" (partial rendered with the including scope's current
   context, referencing its loop variable); default auto-escaping left on. #}
<section class="tile">
  <h3>{{ item.name }}</h3>
  <p class="v">{{ item.value }}</p>
  <span class="badge">{{ item.badge }}</span>
</section>
