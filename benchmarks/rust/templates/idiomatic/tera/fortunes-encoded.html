{# Idiomatic Tera template (WI5, README D8/Q1.7). Patterns follow the Tera docs
   (keats.github.io/tera): "Auto-escaping" (default escaping handles untrusted data -
   no safe filter) and "Control structures - For loops". #}
<!DOCTYPE html>
<html>
<head>
  <title>Fortunes</title>
</head>
<body>
  <table>
    <tr><th>id</th><th>message</th></tr>
    {% for r in rows %}
      <tr><td>{{ r.id }}</td><td>{{ r.message }}</td></tr>
    {% endfor %}
  </table>
</body>
</html>
