{# Idiomatic Askama template (WI5, README D8/Q1.7). Patterns follow the Askama 0.16 book:
   "Filters - escape" (the default Html escaper handles untrusted data - no safe, no raw)
   and "Template syntax - For". #}
<!DOCTYPE html>
<html>
<head>
  <title>Fortunes</title>
</head>
<body>
  <table>
    <tr><th>id</th><th>message</th></tr>
    {% for r in rows %}
      <tr><td>{{ r.id }}</td><td>{{ r.message }}</td></tr>
    {% endfor %}
  </table>
</body>
</html>
