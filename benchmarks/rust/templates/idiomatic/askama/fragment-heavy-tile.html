{# Idiomatic Askama tile partial (WI5, README D8/Q1.7). Patterns follow the Askama 0.16
   book: "Template syntax - Include" (partial referencing the including scope's loop
   variable); default HTML escaping left on. #}
<section class="tile">
  <h3>{{ item.name }}</h3>
  <p class="v">{{ item.value }}</p>
  <span class="badge">{{ item.badge }}</span>
</section>
